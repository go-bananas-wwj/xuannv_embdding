experiment:
  name: building_change_harbin_bitemporal_linear_v2
  seed: 42
  device: auto
training:
  epochs: 200
  lr: 3.0e-05
  weight_decay: 0.01
  batch_size: 8
  num_workers: 0
  early_stop_patience: 30
  head_type: linear
  loss: focal_tversky
  pos_weight: 2000
  label_fraction: 1.0
  months:
  - 202512
  - 202605
  tversky_beta: 0.7
  tversky_weight: 2.0
  focal_gamma: 2.0
  early_stop_metric: f1_best
  use_weighted_sampler: true
  sampler_weight_strategy: binary
  use_threshold_tuning: true
  pos_prior: 0.0015
data:
  embed_dim: 64
  num_classes: 2
