_base_: _base_.yaml

experiment:
  name: construction_site_harbin_v1.1_quick
  seed: 42

training:
  head_type: unet
  loss: bce_dice_tversky
  lr: 3.0e-5
  pos_weight: 200.0
  tversky_beta: 0.7
  early_stop_metric: f1_best
  early_stop_patience: 20
  use_weighted_sampler: true
  sampler_min_weight: 0.0001
  sampler_oversample_factor: 1.0
  use_threshold_tuning: true
  warmup_epochs: 5
  scheduler: cosine
  grad_clip: 1.0
  pos_prior: 0.015
  month: 202512
