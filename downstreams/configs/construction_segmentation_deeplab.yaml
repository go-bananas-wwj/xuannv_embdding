experiment:
  name: construction_segmentation_deeplab_sparse_v1
  seed: 42
  device: auto

training:
  epochs: 120
  lr: 3.0e-05
  weight_decay: 0.01
  batch_size: 8
  num_workers: 0
  early_stop_patience: 25
  early_stop_metric: f1_best
  head_type: deeplabv3plus
  head_hidden_dim: 192
  head_dropout: 0.2
  aspp_rates:
    - 3
    - 6
    - 12
  loss: bce_dice_tversky
  pos_weight: 150.0
  dice_weight: 1.0
  tversky_weight: 1.0
  tversky_beta: 0.75
  pos_prior: 0.04
  label_fraction: 1.0
  month: 202604
  use_threshold_tuning: true
  warmup_epochs: 5
  scheduler: cosine
  grad_clip: 1.0

data:
  embed_dim: 64
  num_classes: 2
