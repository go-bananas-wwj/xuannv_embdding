experiment:
  name: construction_harbin_end_to_end_upernet
  seed: 42
  device: auto
training:
  epochs: 200
  lr: 0.0001
  weight_decay: 0.01
  batch_size: 4
  num_workers: 0
  early_stop_patience: 30
  head_type: upernet
  loss: bce_dice_tversky
