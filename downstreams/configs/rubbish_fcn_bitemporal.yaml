_base_: _base_.yaml

experiment:
  name: rubbish_harbin_bitemporal_fcn_v2

training:
  head_type: fcn
  loss: focal_tversky
  lr: 3.0e-5
  pos_weight: 2000
  tversky_beta: 0.7
  tversky_weight: 2.0
  focal_gamma: 2.0
  early_stop_metric: f1_best
  early_stop_patience: 30
  use_weighted_sampler: true
  use_threshold_tuning: true
  pos_prior: 0.0008
  batch_size: 8
  epochs: 200
  months: [202512, 202605]
