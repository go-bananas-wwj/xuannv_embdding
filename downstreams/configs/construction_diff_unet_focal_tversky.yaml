_base_: _base_.yaml

experiment:
  name: construction_harbin_bitemporal_diff_unet_focal_tversky_v1

training:
  head_type: diff_unet
  loss: focal_tversky
  lr: 1.0e-4
  pos_weight: 50.0
  tversky_alpha: 0.3
  tversky_beta: 0.7
  focal_gamma: 2.0
  early_stop_metric: f1_best
  early_stop_patience: 30
  use_weighted_sampler: true
  use_threshold_tuning: true
  pos_prior: 0.1
  batch_size: 8
  epochs: 200
  months: [202512, 202605]
