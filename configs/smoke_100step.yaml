_base_: base.yaml

experiment:
  name: smoke_100step
  use_wandb: false

training:
  epochs: 25
  lr: 1.0e-4
  weight_decay: 0.05
  warmup_epochs: 2
  gradient_accumulation_steps: 1
  save_every: 10
  eval_every: 10
  amp: true
  gradient_checkpointing: false
  log_every: 5

model:
  num_months: 17
  embed_dim: 32
  stem_dim: 16
  sensor_channels:
    s2: 12
  stp:
    space_dim: 128
    time_dim: 64
    precision_dim: 32
    num_blocks: 2
    num_heads: 4
  target_heads:
    s2_recon:
      loss_type: continuous
      channels: 12
      weight: 1.0

data:
  region: harbin
  root: /data/xuannv_embedding/processed/harbin
  manifest_path: /data/xuannv_embedding/processed/harbin/manifest.json
  statistics_dir: /data/xuannv_embedding/statistics/harbin
  patch_size: 128
  num_samples: 0
  batch_size: 4
  max_patches: 16
  num_workers: 0
  sources:
    - s2
