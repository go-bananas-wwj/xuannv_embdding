experiment:
  name: smoke_test
  seed: 42
  use_wandb: false
  wandb_project: xuannv-embedding-stage1
model:
  embed_dim: 64
  stem_dim: 32
  stp:
    space_dim: 512
    time_dim: 256
    precision_dim: 128
    num_blocks: 6
    num_heads: 8
  sensor_channels:
    s2: 12
    s1: 2
    landsat: 7
    highres_optical_haidian: 4
    highres_optical_harbin: 3
    highres_sar_haidian: 1
  target_heads:
    s2_recon:
      loss_type: continuous
      channels: 12
      weight: 1.0
    s1_recon:
      loss_type: continuous
      channels: 2
      weight: 1.0
    landsat_recon:
      loss_type: continuous
      channels: 7
      weight: 1.0
    worldcover:
      loss_type: categorical
      channels: 9
      weight: 0.5
training:
  epochs: 1
  lr: 0.001
  weight_decay: 0.05
  warmup_epochs: 0
  gradient_accumulation_steps: 1
  save_every: 1
  eval_every: 1
  amp: false
  gradient_checkpointing: false
  log_every: 0
data:
  root: /data/xuannv_embedding/processed/harbin_smoke/scenes
  region: harbin_smoke
  manifest_path: /data/xuannv_embedding/processed/harbin_smoke/scenes/manifest.json
  statistics_dir: /data/xuannv_embedding/statistics/harbin_smoke
  num_samples: 8
  batch_size: 2
  num_workers: 8
  patch_size: 64
  months:
  - 2025-01
  - 2025-02
  - 2025-03
  - 2025-04
  - 2025-05
  - 2025-06
  - 2025-07
  - 2025-08
  - 2025-09
  - 2025-10
  - 2025-11
  - 2025-12
  - 2026-01
  - 2026-02
  - 2026-03
  - 2026-04
  - 2026-05
  max_patches: 8
  sources:
  - s2
  - s1
