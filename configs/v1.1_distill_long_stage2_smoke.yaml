experiment:
  name: v1.1_distill_long_stage2_smoke
  seed: 42
  use_wandb: false
  wandb_project: xuannv-embedding-stage1
  wandb_run_name: v1.1_distill_long_stage2_smoke
model:
  embed_dim: 64
  stem_dim: 32
  stp:
    space_dim: 512
    time_dim: 256
    precision_dim: 128
    num_blocks: 6
    num_heads: 8
  sensor_channels:
    s2: 12
    s1: 2
    landsat: 7
    highres_optical_harbin: 3
    highres_optical: 3
    highres_sar: 1
  target_heads:
    s2_recon:
      loss_type: continuous
      channels: 12
      weight: 1.0
    s1_recon:
      loss_type: continuous
      channels: 2
      weight: 1.0
    landsat_recon:
      loss_type: continuous
      channels: 7
      weight: 1.0
    worldcover:
      loss_type: categorical
      channels: 9
      weight: 0.25
    highres_optical_harbin_recon:
      loss_type: continuous
      channels: 3
      weight: 1.0
    highres_optical_recon:
      loss_type: continuous
      channels: 3
      weight: 1.0
    highres_sar_recon:
      loss_type: continuous
      channels: 1
      weight: 1.0
  num_months: 17
training:
  epochs: 1
  lr: 0.00005
  weight_decay: 0.05
  warmup_epochs: 2
  gradient_accumulation_steps: 1
  save_every: 1
  eval_every: 1
  amp: false
  gradient_checkpointing: false
  log_every: 1
  distill_weight: 0.1
  distill_months: 12
  grad_clip_norm: 1.0
data:
  root: /data/xuannv_embedding/processed
  region: combined
  manifest_path: /data/xuannv_embedding/processed/manifest_all_744.json
  statistics_dir: /data/xuannv_embedding/statistics
