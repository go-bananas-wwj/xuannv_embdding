  - 2025-05
  - 2025-06
  - 2025-07
  - 2025-08
  - 2025-09
  - 2025-10
  - 2025-11
  - 2025-12
  - 2026-01
  - 2026-02
  - 2026-03
  - 2026-04
  - 2026-05
  sources:
  - s2
  - s1
  - landsat
  - worldcover
  - highres_optical_harbin
  - highres_optical
  - highres_sar
