_base_: base.yaml

experiment:
  name: harbin_monthly_v1

training:
  epochs: 100
  lr: 1.0e-4
  weight_decay: 0.05
  warmup_epochs: 5
  gradient_accumulation_steps: 1
  save_every: 10
  eval_every: 10
  amp: true
  gradient_checkpointing: true
  log_every: 0

model:
  num_months: 17
  sensor_channels:
    s2: 12
    s1: 2
    landsat: 7
  stp:
    space_dim: 512
    time_dim: 256
    precision_dim: 128
    num_blocks: 6
    num_heads: 8

data:
  region: harbin
  root: /data/xuannv_embedding/processed/harbin
  manifest_path: /data/xuannv_embedding/processed/harbin/manifest.json
  statistics_dir: /data/xuannv_embedding/statistics/harbin
  patch_size: 128
  num_samples: 0
  batch_size: 4
  num_workers: 8
  sources:
    - s2
    - s1
    - landsat
    - worldcover
