_base_: base.yaml

experiment:
  name: smoke_train
  use_wandb: false

training:
  epochs: 7
  lr: 1.0e-4
  weight_decay: 0.05
  warmup_epochs: 1
  gradient_accumulation_steps: 1
  save_every: 5
  eval_every: 5
  amp: false
  gradient_checkpointing: false
  log_every: 1

model:
  num_months: 17
  sensor_channels:
    s2: 12
    s1: 2
    landsat: 7
  stp:
    space_dim: 512
    time_dim: 256
    precision_dim: 128
    num_blocks: 6
    num_heads: 8

data:
  region: harbin
  root: /data/xuannv_embedding/processed/harbin
  manifest_path: /data/xuannv_embedding/processed/harbin/manifest.json
  statistics_dir: /data/xuannv_embedding/statistics/harbin
  patch_size: 128
  num_samples: 0
  batch_size: 4
  max_patches: 64
  num_workers: 0
  sources:
    - s2
    - s1
    - landsat
    - worldcover
